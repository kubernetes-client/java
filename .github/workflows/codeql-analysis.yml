name: "CodeQL"

on:
  push:
    branches: [ master ]
    paths:
      - '**/*.java'
      - '**/BUILD.bazel'
      - 'MODULE.bazel'
      - '.bazelrc'
      - '.github/workflows/codeql-analysis.yml'
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ master ]
    paths:
      - '**/*.java'
      - '**/BUILD.bazel'
      - 'MODULE.bazel'
      - '.bazelrc'
      - '.github/workflows/codeql-analysis.yml'
  schedule:
    - cron: '37 19 * * 0'

permissions:
  contents: read

jobs:
  analyze:
    permissions:
      actions: read  # for github/codeql-action/init to get workflow details
      contents: read  # for actions/checkout to fetch code
      security-events: write  # for github/codeql-action/autobuild to send a status report
    name: Analyze
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: [ 'java' ]
    env:
      BAZELISK_SKIP_VERSION_CHECK: "1"

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Setup Java
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        distribution: 'temurin'
        java-version: 17.0.x
    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
      with:
        languages: ${{ matrix.language }}

    - name: Install Bazelisk
      run: |
        mkdir -p "$HOME/.local/bin"
        curl -fsSL \
          https://github.com/bazelbuild/bazelisk/releases/download/v1.24.1/bazelisk-linux-amd64 \
          -o "$HOME/.local/bin/bazel"
        chmod +x "$HOME/.local/bin/bazel"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Restore Bazel caches
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: |
          ~/.cache/bazel-disk-cache
          ~/.cache/bazel/cache/repos/v1
        key: bazel-${{ runner.os }}-codeql-java${{ matrix.language }}-${{ hashFiles('MODULE.bazel', '.bazelversion', 'maven_install.json') }}
        restore-keys: |
          bazel-${{ runner.os }}-codeql-java${{ matrix.language }}-
          bazel-${{ runner.os }}-

    # Build with Bazel so CI/CD remains Maven-free.
    - name: Build project
      run: bazel build --config=ci //...

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
